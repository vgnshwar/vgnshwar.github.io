name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Hugo
        run: |
          set -euo pipefail
          HUGO_VERSION=0.147.0
          HUGO_SHA256=8dc6e2d7c7c1a3ecf7abf756068af1b30c8197108ae0cc7ffd83ef2b88f0c26d
          HUGO_ARCHIVE="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          HUGO_BASE_URL="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          curl -sSL -o "/tmp/${HUGO_ARCHIVE}" "${HUGO_BASE_URL}/${HUGO_ARCHIVE}"
          cd /tmp
          echo "${HUGO_SHA256}  ${HUGO_ARCHIVE}" | sha256sum -c -
          tar -xzf "${HUGO_ARCHIVE}" hugo
          sudo install -m 0755 hugo /usr/local/bin/hugo
          hugo version

      - name: Build Hugo site
        run: hugo --minify --cleanDestinationDir --baseURL "https://vgnshwar.github.io/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
